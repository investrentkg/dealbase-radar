name: Railway Setup - Step 4 Create Backend Service

on:
  workflow_dispatch:

jobs:
  create-service:
    runs-on: ubuntu-latest
    steps:
      - name: Create backend service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation serviceCreate($input: ServiceCreateInput!) { serviceCreate(input: $input) { id name } }",
              "variables": {
                "input": {
                  "projectId": "be61082f-3348-416f-a6c3-8f34b2839c73",
                  "name": "backend",
                  "source": { "repo": "investrentkg/dealbase-radar" }
                }
              }
            }')
          echo "$RESULT"
          echo "::notice::SERVICE_CREATE: $RESULT"
