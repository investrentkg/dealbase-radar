name: Find backend URL
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Try candidate URLs
        run: |
          echo "=== dealbase-radar-backend-production ===" > /tmp/result.txt
          curl -s -o /dev/null -w "HTTP: %{http_code}\n" --max-time 10 "https://dealbase-radar-backend-production.up.railway.app/health" >> /tmp/result.txt 2>&1 || echo "FAILED" >> /tmp/result.txt
          curl -s --max-time 10 "https://dealbase-radar-backend-production.up.railway.app/health" >> /tmp/result.txt 2>&1
          echo "" >> /tmp/result.txt
          echo "=== dealbase-radar-production ===" >> /tmp/result.txt
          curl -s -o /dev/null -w "HTTP: %{http_code}\n" --max-time 10 "https://dealbase-radar-production.up.railway.app/health" >> /tmp/result.txt 2>&1 || echo "FAILED" >> /tmp/result.txt
          curl -s --max-time 10 "https://dealbase-radar-production.up.railway.app/health" >> /tmp/result.txt 2>&1
          cat /tmp/result.txt
      - name: Commit result
        run: |
          cp /tmp/result.txt url_check_result.txt
          git config user.name "investrentkg"
          git config user.email "zarzad@investrent.com.pl"
          git add url_check_result.txt
          git diff --cached --quiet || git commit -m "diag: wynik sprawdzenia URL backendu"
          git push
