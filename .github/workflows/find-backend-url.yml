name: Find backend URL
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SERVICE_ID: c4e67d61-115f-4230-bf20-12826b71406e
      ENV_ID: 3f19ef06-e650-41ae-abb7-b377ae8f085b
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Query Railway for domains
        run: |
          {
            curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"query { serviceInstance(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\") { domains { serviceDomains { domain } customDomains { domain } } } }\"}"
            echo ""
            echo "=== health ==="
            curl -s --max-time 10 "https://backend-production-0a9f.up.railway.app/health"
            echo ""
            echo "=== cron bez sekretu (oczekiwane 403) ==="
            curl -s -X POST --max-time 10 "https://backend-production-0a9f.up.railway.app/api/cron/scan-watchlists"
          } > railway_domain_result.json
          cat railway_domain_result.json
      - name: Commit result
        run: |
          git config user.name "investrentkg"
          git config user.email "zarzad@investrent.com.pl"
          git add railway_domain_result.json
          git diff --cached --quiet || git commit -m "diag: wynik zapytania o domene Railway"
          git push
