name: Vercel Diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TEAM_ID: team_ZRjQTrzpkrPD2qrXAWNMBT6f
      PROJECT_ID: prj_CAWCv8qzUQHPatSZGIb1Q6C0NaPK
    steps:
      - name: List latest deployments
        run: |
          curl -s "https://api.vercel.com/v6/deployments?teamId=$TEAM_ID&projectId=$PROJECT_ID&limit=5" -H "Authorization: Bearer $VERCEL_TOKEN" > deployments.json
          echo "::notice::DEPLOYMENTS: $(cat deployments.json)"

      - name: Check production domain assignment
        run: |
          curl -s "https://api.vercel.com/v9/projects/$PROJECT_ID/domains?teamId=$TEAM_ID" -H "Authorization: Bearer $VERCEL_TOKEN" > domains.json
          echo "::notice::DOMAINS: $(cat domains.json)"

      - name: Direct fetch of production URL
        run: |
          CODE=$(curl -s -o response.html -w "%{http_code}" https://dealbase-radar-investrent-s-projects.vercel.app/)
          echo "::notice::ROOT_STATUS: $CODE"
          echo "::notice::ROOT_BODY_SNIPPET: $(head -c 300 response.html)"
