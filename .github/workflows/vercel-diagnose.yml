name: Vercel Diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check correct production URL
        run: |
          CODE=$(curl -sL -o response.html -w "%{http_code}" https://dealbase-radar.vercel.app/logowanie)
          echo "::notice::CORRECT_URL_STATUS: $CODE"
          echo "::notice::BODY_SNIPPET: $(head -c 400 response.html)"
