name: Railway Setup - Step 6 Deploy and Domain

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      ENV_ID: 3f19ef06-e650-41ae-abb7-b377ae8f085b
      SERVICE_ID: c4e67d61-115f-4230-bf20-12826b71406e
    steps:
      - name: Trigger deployment
        run: |
          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation serviceInstanceDeployV2(\$serviceId: String!, \$environmentId: String!) { serviceInstanceDeployV2(serviceId: \$serviceId, environmentId: \$environmentId) }\",
              \"variables\": { \"serviceId\": \"$SERVICE_ID\", \"environmentId\": \"$ENV_ID\" }
            }")
          echo "$RESULT"
          echo "::notice::DEPLOY: $RESULT"

      - name: Create public domain
        run: |
          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation serviceDomainCreate(\$input: ServiceDomainCreateInput!) { serviceDomainCreate(input: \$input) { domain } }\",
              \"variables\": { \"input\": { \"serviceId\": \"$SERVICE_ID\", \"environmentId\": \"$ENV_ID\" } }
            }")
          echo "$RESULT"
          echo "::notice::DOMAIN: $RESULT"
