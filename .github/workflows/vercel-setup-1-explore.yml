name: Vercel Setup - Step 1 Explore

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Check user and teams
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          USER=$(curl -s https://api.vercel.com/v2/user -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "::notice::USER: $USER"
          TEAMS=$(curl -s https://api.vercel.com/v2/teams -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "::notice::TEAMS: $TEAMS"
