name: Verify photo consent endpoint
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check
        run: |
          {
            echo "=== health ==="
            curl -s --max-time 10 "https://backend-production-0a9f.up.railway.app/health"
            echo ""
            echo "=== photo-consent bez auth (oczekiwane 401, NIE 404) ==="
            curl -s -o /dev/null -w "HTTP: %{http_code}\n" --max-time 10 "https://backend-production-0a9f.up.railway.app/api/photo-consent/statement"
            curl -s --max-time 10 "https://backend-production-0a9f.up.railway.app/api/photo-consent/statement"
          } > verify_result.txt
          cat verify_result.txt
      - name: Commit
        run: |
          git config user.name "investrentkg"
          git config user.email "zarzad@investrent.com.pl"
          git add verify_result.txt
          git diff --cached --quiet || git commit -m "diag: weryfikacja endpointu photo-consent"
          git push
