name: Railway Check Triggers

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SERVICE_ID: c4e67d61-115f-4230-bf20-12826b71406e
      ENV_ID: 3f19ef06-e650-41ae-abb7-b377ae8f085b
      PROJECT_ID: be61082f-3348-416f-a6c3-8f34b2839c73
    steps:
      - name: Check deployment triggers
        run: |
          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"query { deploymentTriggers(projectId: \\\"$PROJECT_ID\\\") { edges { node { id branch repository serviceId environmentId } } } }\"
            }")
          echo "::notice::TRIGGERS: $RESULT"

      - name: Latest health after redeploy
        run: |
          HEALTH=$(curl -s https://backend-production-0a9f.up.railway.app/health)
          echo "::notice::HEALTH: $HEALTH"

      - name: Test /api/auth/me exists (should 401 without token, not 404)
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://backend-production-0a9f.up.railway.app/api/auth/me)
          echo "::notice::ME_ENDPOINT_STATUS: $CODE"
