name: Test Shadow Market Contract

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE: https://backend-production-0a9f.up.railway.app
      SERVICE_KEY: ${{ secrets.INTERNAL_SERVICE_API_KEY }}
    steps:
      - name: Register test user and create watchlist
        run: |
          EMAIL="ci-shadow-$(date +%s)@dealbase-test.dev"
          REG=$(curl -s -X POST "$BASE/api/auth/register" -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"TestPassword123\"}")
          TOKEN=$(echo "$REG" | python3 -c "import json,sys; print(json.load(sys.stdin)['token'])")
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "EMAIL=$EMAIL" >> $GITHUB_ENV

          WATCHLIST=$(curl -s -X POST "$BASE/api/watchlist" -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" \
            -d '{"name":"CI shadow market test","criteria":{"city":"Kolobrzeg","property_type":"mieszkanie"}}')
          echo "$WATCHLIST"
          WATCHLIST_ID=$(echo "$WATCHLIST" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "WATCHLIST_ID=$WATCHLIST_ID" >> $GITHUB_ENV

      - name: CRM lists demand signals (service auth)
        run: |
          SIGNALS=$(curl -s "$BASE/api/demand-signals?city=Kolobrzeg" -H "X-Service-Key: $SERVICE_KEY")
          echo "::notice::SIGNALS: $SIGNALS"

      - name: CRM reports a match
        run: |
          MATCH=$(curl -s -X POST "$BASE/api/demand-signals/$WATCHLIST_ID/matches" -H "Content-Type: application/json" -H "X-Service-Key: $SERVICE_KEY" \
            -d '{"agency_name":"InvestRent Nieruchomości","agent_display_name":"Test Agent","offer_summary":"Mieszkanie 45m2 w centrum Kolobrzegu, nowa oferta","offer_price":480000,"offer_area":45,"contact_hint":"Zadzwon do biura InvestRent"}')
          echo "::notice::MATCH_CREATED: $MATCH"

      - name: Test wrong service key is rejected
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/demand-signals" -H "X-Service-Key: zly-klucz")
          echo "::notice::WRONG_KEY_STATUS: $CODE (oczekiwane 401)"

      - name: User fetches own matches
        run: |
          MATCHES=$(curl -s "$BASE/api/watchlist/$WATCHLIST_ID/matches" -H "Authorization: Bearer $TOKEN")
          echo "::notice::USER_SEES_MATCHES: $MATCHES"
