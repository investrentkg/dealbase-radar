name: Scan watchlists (ręczny fallback — harmonogram przeniesiony do backendu 10.07.2026)

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scan
        env:
          CRON_SECRET: ${{ secrets.RADAR_CRON_SECRET }}
        run: |
          curl -s -X POST \
            -H "x-cron-secret: $CRON_SECRET" \
            --max-time 120 \
            "https://backend-production-0a9f.up.railway.app/api/cron/scan-watchlists"
