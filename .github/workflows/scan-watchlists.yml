name: Scan watchlists (4x dziennie)

# Uruchamia skaner watchlist - dla każdej aktywnej watchlisty sprawdza
# agregator względem nowych ofert i wysyła zbiorczy e-mail, jeśli są
# nowe trafienia. Godziny w UTC: 5:00, 10:00, 15:00, 20:00 -> 7:00, 12:00,
# 17:00, 22:00 czasu polskiego (latem, CEST) - równe 5-godzinne odstępy
# w ciągu dnia, dłuższa przerwa nocna (22:00-7:00), bo wtedy najmniej
# nowych ogłoszeń.
on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scan
        env:
          CRON_SECRET: ${{ secrets.RADAR_CRON_SECRET }}
        run: |
          curl -s -X POST \
            -H "x-cron-secret: $CRON_SECRET" \
            --max-time 120 \
            "https://backend-production-0a9f.up.railway.app/api/cron/scan-watchlists"
