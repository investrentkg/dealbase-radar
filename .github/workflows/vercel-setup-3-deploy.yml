name: Vercel Setup - Step 3 Env and Deploy

on:
  workflow_dispatch:

jobs:
  configure-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TEAM_ID: team_ZRjQTrzpkrPD2qrXAWNMBT6f
      PROJECT_ID: prj_CAWCv8qzUQHPatSZGIb1Q6C0NaPK
    steps:
      - name: Set VITE_API_URL env var
        run: |
          RESULT=$(curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env?teamId=$TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "VITE_API_URL",
              "value": "https://backend-production-0a9f.up.railway.app",
              "type": "plain",
              "target": ["production", "preview"]
            }')
          echo "$RESULT"
          echo "::notice::ENV_VAR: $RESULT"

      - name: Trigger deployment
        run: |
          RESULT=$(curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=$TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "dealbase-radar",
              "project": "prj_CAWCv8qzUQHPatSZGIb1Q6C0NaPK",
              "target": "production",
              "gitSource": {
                "type": "github",
                "repo": "dealbase-radar",
                "org": "investrentkg",
                "ref": "main"
              }
            }')
          echo "$RESULT"
          echo "::notice::DEPLOY: $RESULT"
